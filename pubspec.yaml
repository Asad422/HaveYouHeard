name: have_you_heard
description: "A music guessing game app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Env
  flutter_dotenv: ^6.0.1
  
  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # DI
  get_it: ^7.6.4
  
  # Network
  dio: ^5.3.2
  
  # Auth
  flutter_web_auth_2: ^4.0.0
  
  # Audio
  just_audio: ^0.9.36
  
  # Local storage
  hive_flutter: ^1.1.0
  
  # UI
  cached_network_image: ^3.3.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  dartz: ^0.10.1
  flutter_svg: ^2.2.4
  auto_route: ^9.2.2
  bloc: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  auto_route_generator: ^9.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/svg/
    - .env
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700